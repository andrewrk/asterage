name: Deploy to RCade
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    name: Build and Deploy to RCade
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
      - run: zig build --release -p dist
      - uses: fcjr/rcade/action-deploy@main
